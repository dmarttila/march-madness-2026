function BracketScorer() {
  const { games, known_results, names, people } = GAMES_DATA;

  const _up = new URLSearchParams(window.location.search);
  const [results, setResults] = useState(known_results);
  const [activeRound, setActiveRound] = useState(_up.get("round") || "S16");
  const [expandedGames, setExpandedGames] = useState(() => new Set((_up.get("picks") || "").split(",").filter(Boolean)));
  const [mode, setMode] = useState(_up.get("mode") || "time"); // "time" | "region" | "bracket"
  const [hideCompleted, setHideCompleted] = useState(_up.get("hide") === "1");
  const [simulatingPlayer, setSimulatingPlayer] = useState(null);
  const [simOverrides, setSimOverrides] = useState({});
  const [bracketPlayers, setBracketPlayers] = useState([people[0]]);
  const [colorScheme, setColorScheme] = useState(_up.get("color") || "dark");
  const [randomSeed, setRandomSeed] = useState(1);

  // Tonie mode state
  const tonieImgRef = useRef(null);
  const toniePosRef = useRef({x: 120, y: 180});
  const tonieVelRef = useRef({dx: 1.4, dy: 1.1});
  const tonieRafRef = useRef(null);
  const [tonieSpinning, setTonieSpinning] = useState(false);
  const [tonieHidden, setTonieHidden] = useState(false);
  const [tonieKey, setTonieKey] = useState(0);
  const [hiddenPeople, setHiddenPeople] = useState(new Set());
  const [spinningPeople, setSpinningPeople] = useState(new Set());
  const [showCelebration, setShowCelebration] = useState(false);

  // Bouncing people avatars
  const personRefsMap = useRef({});
  const personStateRef = useRef(null);
  const personRafRef = useRef(null);

  // Auto-cycle colors every 10 seconds in tonie mode
  useEffect(() => {
    if (colorScheme !== "tonie") return;
    const id = setInterval(() => setRandomSeed(n => n + 1), 10000);
    return () => clearInterval(id);
  }, [colorScheme]);

  // Bouncing Tonie animation
  useEffect(() => {
    if (colorScheme !== "tonie") {
      if (tonieRafRef.current) cancelAnimationFrame(tonieRafRef.current);
      return;
    }
    const SIZE = 200;
    const step = () => {
      const pos = toniePosRef.current;
      const vel = tonieVelRef.current;
      const W = window.innerWidth;
      const H = window.innerHeight;
      let nx = pos.x + vel.dx;
      let ny = pos.y + vel.dy;
      let ndx = vel.dx;
      let ndy = vel.dy;
      if (nx <= 0 || nx >= W - SIZE) { ndx = -ndx; nx = Math.max(0, Math.min(W - SIZE, nx)); }
      if (ny <= 0 || ny >= H - SIZE) { ndy = -ndy; ny = Math.max(0, Math.min(H - SIZE, ny)); }
      toniePosRef.current = {x: nx, y: ny};
      tonieVelRef.current = {dx: ndx, dy: ndy};
      if (tonieImgRef.current) {
        tonieImgRef.current.style.left = nx + "px";
        tonieImgRef.current.style.top  = ny + "px";
      }
      tonieRafRef.current = requestAnimationFrame(step);
    };
    tonieRafRef.current = requestAnimationFrame(step);
    return () => { if (tonieRafRef.current) cancelAnimationFrame(tonieRafRef.current); };
  }, [colorScheme]);

  // Bouncing people avatars animation
  useEffect(() => {
    if (colorScheme !== "tonie") {
      if (personRafRef.current) cancelAnimationFrame(personRafRef.current);
      personStateRef.current = null;
      return;
    }
    const SIZE = 70;
    personStateRef.current = {};
    people.forEach((p, i) => {
      const W = window.innerWidth;
      const H = window.innerHeight;
      const angle = (i / people.length) * Math.PI * 2 + Math.random() * 0.5;
      const speed = 0.8 + Math.random() * 1.2;
      personStateRef.current[p] = {
        x: W * 0.1 + Math.random() * (W * 0.8),
        y: H * 0.1 + Math.random() * (H * 0.8),
        dx: Math.cos(angle) * speed,
        dy: Math.sin(angle) * speed,
      };
    });
    const step = () => {
      const W = window.innerWidth;
      const H = window.innerHeight;
      people.forEach(p => {
        const s = personStateRef.current?.[p];
        if (!s) return;
        let {x, y, dx, dy} = s;
        x += dx; y += dy;
        if (x <= 0 || x >= W - SIZE) { dx = -dx; x = Math.max(0, Math.min(W - SIZE, x)); }
        if (y <= 0 || y >= H - SIZE) { dy = -dy; y = Math.max(0, Math.min(H - SIZE, y)); }
        personStateRef.current[p] = {x, y, dx, dy};
        const el = personRefsMap.current[p];
        if (el) { el.style.left = x + "px"; el.style.top = y + "px"; }
      });
      personRafRef.current = requestAnimationFrame(step);
    };
    personRafRef.current = requestAnimationFrame(step);
    return () => {
      if (personRafRef.current) cancelAnimationFrame(personRafRef.current);
      personStateRef.current = null;
    };
  }, [colorScheme]);

  const handleTonieTap = () => {
    if (tonieSpinning || tonieHidden) return;
    setTonieSpinning(true);
    setTimeout(() => {
      setTonieHidden(true);
      setTonieSpinning(false);
    }, 700);
  };

  const handlePersonTap = (p) => {
    if (spinningPeople.has(p) || hiddenPeople.has(p)) return;
    setRandomSeed(n => n + 1);
    setSpinningPeople(prev => new Set([...prev, p]));
    setTimeout(() => {
      setSpinningPeople(prev => { const s = new Set(prev); s.delete(p); return s; });
      setHiddenPeople(prev => new Set([...prev, p]));
    }, 700);
  };

  // When all people + Tonie are gone, bring everyone back after 2s
  useEffect(() => {
    if (colorScheme !== "tonie") return;
    if (!tonieHidden) return;
    if (hiddenPeople.size < people.length) return;
    setShowCelebration(true);
    const timer = setTimeout(() => {
      const freshState = {};
      const SIZE = 70;
      people.forEach((p, i) => {
        const W = window.innerWidth;
        const H = window.innerHeight;
        const angle = (i / people.length) * Math.PI * 2 + Math.random() * 0.5;
        const speed = 0.8 + Math.random() * 1.2;
        freshState[p] = {
          x: W * 0.1 + Math.random() * (W * 0.8 - SIZE),
          y: H * 0.1 + Math.random() * (H * 0.8 - SIZE),
          dx: Math.cos(angle) * speed,
          dy: Math.sin(angle) * speed,
        };
      });
      personStateRef.current = freshState;
      setShowCelebration(false);
      setHiddenPeople(new Set());
      setSpinningPeople(new Set());
      setTonieHidden(false);
      setTonieKey(k => k + 1);
    }, 2000);
    return () => clearTimeout(timer);
  }, [tonieHidden, hiddenPeople, colorScheme]);

  useEffect(() => {
    const p = new URLSearchParams();
    if (activeRound !== "S16") p.set("round", activeRound);
    if (hideCompleted) p.set("hide", "1");
    if (mode !== "time") p.set("mode", mode);
    if (expandedGames.size > 0) p.set("picks", [...expandedGames].join(","));
    if (colorScheme !== "dark") p.set("color", colorScheme);
    const qs = p.toString();
    window.history.replaceState(null, "", qs ? "?" + qs : window.location.pathname);
  }, [activeRound, hideCompleted, mode, expandedGames, colorScheme]);

  const effectiveResults = useMemo(() => ({ ...results, ...simOverrides }), [results, simOverrides]);

  const setWinner = (gameId, team) => {
    setResults(r => ({ ...r, [gameId]: r[gameId] === team ? null : team }));
  };

  const scores = useMemo(() => {
    const s = {};
    people.forEach(p => { s[p] = { total: 0, byRound: {} }; });
    games.forEach(g => {
      const winner = effectiveResults[g.id];
      people.forEach(p => {
        const pick = g.picks[p];
        const correct = winner && pick === winner;
        if (!s[p].byRound[g.round]) s[p].byRound[g.round] = 0;
        if (correct) {
          s[p].total += g.pts;
          s[p].byRound[g.round] += g.pts;
        }
      });
    });
    return s;
  }, [effectiveResults]);

  // Compute all eliminated teams from every round with a known result.
  // R1 games have t1/t2 in the data; R2+ games have t1:null but we can
  // infer the two contestants from FEEDERS (the winners of the feeder games).
  const deadTeams = useMemo(() => {
    const dead = new Set();
    games.forEach(g => {
      if (!effectiveResults[g.id]) return;
      const contestants = g.t1 && g.t2
        ? [g.t1, g.t2]
        : (FEEDERS[g.id] || []).map(f => effectiveResults[f]).filter(Boolean);
      if (contestants.length === 2) {
        const loser = contestants.find(t => t !== effectiveResults[g.id]);
        if (loser) dead.add(loser);
      }
    });
    return dead;
  }, [effectiveResults]);

  const maxPossible = useMemo(() => {
    const mp = {};
    people.forEach(p => {
      let possible = scores[p].total;
      games.forEach(g => {
        if (!effectiveResults[g.id] && g.picks[p] && !deadTeams.has(g.picks[p])) {
          possible += g.pts;
        }
      });
      mp[p] = possible;
    });
    return mp;
  }, [scores, effectiveResults, deadTeams]);

  const canWin = useMemo(() => {
    // For each person p, simulate the best-case scenario for p:
    // every remaining game is won by p's pick (skipping eliminated teams).
    // Under that outcome, check if p finishes with the highest score (ties count).
    const cw = {};
    people.forEach(p => {
      const sim = {};
      people.forEach(q => { sim[q] = scores[q].total; });
      games.forEach(g => {
        if (!effectiveResults[g.id]) {
          const winner = g.picks[p];
          if (winner && !deadTeams.has(winner)) {
            people.forEach(q => { if (g.picks[q] === winner) sim[q] += g.pts; });
          }
        }
      });
      cw[p] = people.every(q => q === p || sim[p] >= sim[q]);
    });
    return cw;
  }, [scores, effectiveResults, deadTeams]);

  // Count alive (non-dead) remaining picks per person — used as tiebreaker
  const alivePicks = useMemo(() => {
    const ap = {};
    people.forEach(p => {
      ap[p] = games.filter(g => !effectiveResults[g.id] && g.picks[p] && !deadTeams.has(g.picks[p])).length;
    });
    return ap;
  }, [scores, deadTeams, effectiveResults]);

  const ranked = [...people].sort((a,b) =>
    scores[b].total - scores[a].total ||
    maxPossible[b] - maxPossible[a] ||
    alivePicks[b] - alivePicks[a]
  );

  // Compute display ranks, giving ties the same number (e.g. two people at #5)
  const rankNums = [];
  ranked.forEach((p, i) => {
    if (i === 0) { rankNums.push(1); return; }
    const prev = ranked[i-1];
    rankNums.push(
      scores[prev].total === scores[p].total && maxPossible[prev] === maxPossible[p]
        ? rankNums[i-1] : i + 1
    );
  });

  const roundGames = games
    .filter(g => g.round === activeRound && !(hideCompleted && known_results[g.id]))
    .sort((a, b) => {
      if (mode !== "time") return 0; // preserve original order for region sort
      const ak = GAME_TIMES[a.id]?.sortKey ?? 999;
      const bk = GAME_TIMES[b.id]?.sortKey ?? 999;
      return ak - bk;
    });

  const gameById = useMemo(() => { const m = {}; games.forEach(g => { m[g.id] = g; }); return m; }, []);
  const teamSeed = useMemo(() => {
    const map = {};
    games.filter(g => g.round === "R1").forEach(g => {
      const parts = g.label.split(" vs ");
      const s1 = parts[0].match(/\((\d+)\)/); const s2 = parts[1] && parts[1].match(/\((\d+)\)/);
      if (s1 && g.t1) map[g.t1] = s1[1];
      if (s2 && g.t2) map[g.t2] = s2[1];
    });
    return map;
  }, [games]);

  // Two fixed colors for bracket comparison (work across all themes)
  const PC = ["#60a5fa","#f97316"]; // blue, orange

  // Bracket view renderers — players is always an array (1 or 2 elements)
  const bR1Slot = (gameId, players) => {
    const g = gameById[gameId];
    const actual = effectiveResults[gameId];
    const multi = players.length > 1;
    return (
      <div key={gameId} style={{borderBottom:"1px solid "+border2}}>
        {[g.t1, g.t2].map(team => {
          const won = actual === team;
          const lost = actual && actual !== team;
          const pickerIdxs = players.map((p,i) => g.picks[p] === team ? i : -1).filter(i => i >= 0);
          const isPick = pickerIdxs.length > 0;
          return (
            <div key={team} style={{height:SH,display:"flex",alignItems:"center",padding:"0 4px",fontSize:11,
              color: isPick ? (won?"#86efac":lost?"#fca5a5":text) : (lost?textDimmer:textDim),
              fontWeight: isPick ? 700 : 400,
              textDecoration: lost ? "line-through" : "none",
              background: isPick && !won && !lost ? "#ffffff08" : "transparent",
            }}>
              <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginRight:2}}>{short(team)}{teamSeed[team] ? <span style={{color:"#64748b",marginLeft:4}}>{teamSeed[team]}</span> : null}</span>
              {multi && (
                <span style={{display:"flex",gap:2,flexShrink:0}}>
                  {players.map((p,i) => (
                    <span key={i} style={{width:5,height:5,borderRadius:"50%",
                      background: g.picks[p] === team ? PC[i] : "transparent"}} />
                  ))}
                </span>
              )}
            </div>
          );
        })}
      </div>
    );
  };

  const bSlot = (gameId, spans, players) => {
    const g = gameById[gameId];
    const actual = effectiveResults[gameId];
    const height = spans * 2 * SH;
    const multi = players.length > 1;
    const picks = players.map(p => g.picks[p]);

    if (!multi) {
      const pick = picks[0];
      const correct = actual && pick === actual;
      const wrong = actual && pick !== actual;
      return (
        <div key={gameId} style={{height,display:"flex",alignItems:"center",padding:"0 8px",
          borderBottom:"1px solid "+border2,
          background: correct?"#052e1650":wrong?"#2d0a0a50":"transparent",
        }}>
          <span style={{fontSize:11,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
            color: correct?"#86efac":wrong?"#fca5a5":textMuted,
            textDecoration: wrong?"line-through":"none",
          }}>
            {pick ? short(pick) : "—"}{correct?" ✓":""}
          </span>
        </div>
      );
    }

    const agree = picks[0] === picks[1];
    if (agree) {
      const pick = picks[0];
      const correct = actual && pick === actual;
      const wrong = actual && pick !== actual;
      return (
        <div key={gameId} style={{height,display:"flex",flexDirection:"column",justifyContent:"center",
          padding:"0 5px",borderBottom:"1px solid "+border2,
          background: correct?"#052e1650":wrong?"#2d0a0a50":"transparent",
        }}>
          <div style={{display:"flex",gap:3,alignItems:"center"}}>
            {PC.map((c,i) => <span key={i} style={{width:5,height:5,borderRadius:"50%",background:c,flexShrink:0}} />)}
            <span style={{fontSize:10,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
              color: correct?"#86efac":wrong?"#fca5a5":textMuted,
              textDecoration: wrong?"line-through":"none",
            }}>
              {pick ? short(pick) : "—"}{correct?" ✓":""}
            </span>
          </div>
        </div>
      );
    }

    // Different picks — show both stacked
    return (
      <div key={gameId} style={{height,display:"flex",flexDirection:"column",justifyContent:"center",
        gap:2,padding:"2px 5px",borderBottom:"1px solid "+border2,
      }}>
        {picks.map((pick, i) => {
          const correct = actual && pick === actual;
          const wrong = actual && pick !== actual;
          return (
            <div key={i} style={{display:"flex",gap:3,alignItems:"center"}}>
              <span style={{width:5,height:5,borderRadius:"50%",background:PC[i],flexShrink:0}} />
              <span style={{fontSize:10,fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
                color: correct?"#86efac":wrong?"#fca5a5":PC[i],
                textDecoration: wrong?"line-through":"none",
              }}>
                {pick ? short(pick) : "—"}{correct?" ✓":""}
              </span>
            </div>
          );
        })}
      </div>
    );
  };

  const T = colorScheme==="light" ? LIGHT_T : (colorScheme==="random"||colorScheme==="tonie") ? makeRandT(randomSeed) : DARK_T;
  const {pageBg,cardBg,headerBg,border,border2,text,textSub,textMuted,textDim,textDimmer,chipBg,chipLeadBg,leadText,leadScore,leadRank,inputBg,rowAlt} = T;

  return (
    <div style={{fontFamily:"system-ui,sans-serif",background:pageBg,minHeight:"100vh",color:text}}>

      {/* Header */}
      <div style={{background:headerBg,padding:"16px 20px",borderBottom:"1px solid "+border2,display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:22}}>🏀</span>
        <div style={{flex:1}}>
          <div style={{fontSize:18,fontWeight:700,color:text}}>Tahoe Crappers March Madness Extravaganza Pool</div>
          <div style={{fontSize:11,color:textMuted}}>{Object.keys(results).length} / 63 results entered · Click team to set winner, click again to clear</div>
        </div>
        <div style={{display:"flex",gap:4,flexShrink:0}}>
          {[["dark","🌙"],["light","☀️"],["random","🎨"],["tonie","T"]].map(([s,icon]) => (
            <button key={s} onClick={() => { setColorScheme(s); if(s==="random"||s==="tonie") setRandomSeed(n=>n+1); }} style={{
              background:colorScheme===s?"#3b82f6":border2,border:"none",borderRadius:6,
              padding:"5px 8px",cursor:"pointer",fontSize:s==="tonie"?13:15,fontWeight:s==="tonie"?"bold":undefined,
              opacity:colorScheme===s?1:0.55,
            }}>
              {icon}
            </button>
          ))}
        </div>
      </div>

      {/* Leaderboard strip */}
      <div style={{background:headerBg,padding:"12px 20px",borderBottom:"2px solid "+border2,overflowX:"auto",whiteSpace:"nowrap"}}>
        {ranked.map((p,i) => {
          const rank = rankNums[i];
          const medal = rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":"";
          const lead = rank===1;
          const isSim = simulatingPlayer === p;
          return (
            <span key={p} onClick={() => {
              if (colorScheme === "tonie") setRandomSeed(n => n + 1);
              if (isSim) {
                setSimulatingPlayer(null);
                setSimOverrides({});
              } else {
                setSimulatingPlayer(p);
                const sim = {};
                games.forEach(g => {
                  if (g.round === activeRound && !results[g.id] && g.picks[p] && !deadTeams.has(g.picks[p])) {
                    sim[g.id] = g.picks[p];
                  }
                });
                setSimOverrides(sim);
              }
            }}
              style={{display:"inline-block",marginRight:8,cursor:"pointer",position:"relative",
              background: isSim ? "#2d1b4e" : lead ? chipLeadBg : chipBg,
              border: isSim ? "2px solid #a855f7" : lead ? "1px solid #3b82f6" : "1px solid "+border,
              borderRadius:8,padding:"8px 12px",textAlign:"center",verticalAlign:"top",
              boxShadow: isSim ? "0 0 12px rgba(168,85,247,0.4)" : lead ? "0 0 10px rgba(59,130,246,0.25)" : "none"}}>
              {colorScheme==="tonie" && !canWin[p] && (
                <span style={{position:"absolute",top:-14,left:"50%",fontSize:20,
                  animation:"poop-float 1.4s ease-in-out infinite",
                  pointerEvents:"none",zIndex:10}}>💩</span>
              )}
              <div style={{fontSize:10,color:isSim?"#c084fc":lead?leadRank:textMuted}}>{medal} #{rank}</div>
              <div style={{fontSize:12,fontWeight:600,color:isSim?"#e2e8f0":lead?leadText:textSub}}>{names[p].split(" ")[0]}</div>
              <div style={{fontSize:20,fontWeight:700,color:isSim?"#c084fc":lead?leadScore:textMuted,lineHeight:"1.1"}}>{scores[p].total}</div>
              <div style={{fontSize:9,color:textSub}}>max {maxPossible[p]}</div>
              <div style={{fontSize:9,marginTop:3,borderTop:"1px solid "+border2,paddingTop:3,
                color: canWin[p] ? "#4ade80" : "#ef4444", fontWeight:700}}>
                {canWin[p] ? "✓ ALIVE" : "✗ OUT"}
              </div>
              <div style={{fontSize:9,color:textSub,marginTop:2}}>🏆 {CHAMP_PICKS[p]}</div>
            </span>
          );
        })}
      </div>

      {/* Round tabs */}
      <div style={{display:"flex",padding:"0 20px",borderBottom:"1px solid "+border2,background:pageBg,overflowX:"auto"}}>
        {ROUND_ORDER.map(r => {
          const rg = games.filter(g => g.round === r);
          const done = rg.filter(g => results[g.id]).length;
          const active = r === activeRound;
          return (
            <button key={r} onClick={() => { setActiveRound(r); setSimulatingPlayer(null); setSimOverrides({}); }} style={{
              padding:"10px 14px",border:"none",cursor:"pointer",background:"transparent",
              color: active ? text : textMuted,
              fontWeight: active ? 700 : 400,fontSize:13,
              borderBottom: active ? "3px solid #3b82f6" : "3px solid transparent",
              whiteSpace:"nowrap",display:"flex",flexDirection:"column",alignItems:"flex-start"
            }}>
              <span>
                {ROUND_LABELS[r]}
                <span style={{marginLeft:5,fontSize:10,
                  color: done===rg.length&&done>0 ? "#22c55e" : active ? textSub : textDimmer}}>
                  {done}/{rg.length}
                </span>
              </span>
              <span style={{fontSize:11,color:active?textSub:textMuted,marginTop:1}}>
                {ROUND_PTS[r] === 1 ? "1 pt per game" : ROUND_PTS[r]+" pts"}
              </span>
            </button>
          );
        })}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8,padding:"0 4px"}}>
          {mode !== "bracket" && (
            <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer",fontSize:11,color:textMuted,whiteSpace:"nowrap"}}>
              <input type="checkbox" checked={hideCompleted} onChange={e => setHideCompleted(e.target.checked)}
                style={{cursor:"pointer",accentColor:"#3b82f6"}} />
              Hide done
            </label>
          )}
          {[["time","By Time"],["region","By Region"],["bracket","Brackets"]].map(([m,label]) => (
            <button key={m} onClick={() => setMode(m)} style={{
              padding:"4px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,
              background: mode===m ? (m==="bracket"?"#f59e0b":"#3b82f6") : chipBg,
              color: mode===m ? (m==="bracket"?"#000":"#fff") : textMuted,
              fontWeight: mode===m ? 700 : 400,
            }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* Simulation banner */}
      {(simulatingPlayer || Object.keys(simOverrides).length > 0) && (
        <div style={{background:"#2d1b4e",borderBottom:"1px solid #7e22ce",padding:"8px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:12,color:"#e9d5ff"}}>
            {simulatingPlayer
              ? <>Simulating <strong>{names[simulatingPlayer].split(" ")[0]}'s</strong> picks — tap a purple pick to remove it, tap name to clear all</>
              : <>{Object.keys(simOverrides).length} custom pick{Object.keys(simOverrides).length !== 1 ? "s" : ""} active</>
            }
          </span>
          <button onClick={() => { setSimulatingPlayer(null); setSimOverrides({}); }}
            style={{background:"#7e22ce",border:"none",color:"#fff",borderRadius:5,padding:"3px 8px",fontSize:11,cursor:"pointer"}}>
            Clear
          </button>
        </div>
      )}

      {/* Bracket view */}
      {mode === "bracket" && (
        <div style={{padding:"16px 20px 40px"}}>
          {/* Player selector — tap to select up to 2; tap again to deselect */}
          <div style={{overflowX:"auto",whiteSpace:"nowrap",marginBottom:8,paddingBottom:4}}>
            {people.map(p => {
              const idx = bracketPlayers.indexOf(p);
              const sel = idx >= 0;
              return (
                <button key={p} onClick={() => {
                  if (sel) {
                    if (bracketPlayers.length > 1) setBracketPlayers(bp => bp.filter(x => x !== p));
                  } else {
                    setBracketPlayers(bp => bp.length < 2 ? [...bp, p] : [bp[1], p]);
                  }
                }} style={{
                  marginRight:6,padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",
                  fontSize:12,fontWeight:sel?700:400,
                  background: sel ? PC[idx] : chipBg,
                  color: sel ? "#fff" : textMuted,
                }}>
                  {names[p].split(" ")[0]}
                </button>
              );
            })}
          </div>
          <div style={{marginBottom:12,fontSize:10,color:textMuted}}>
            {bracketPlayers.length === 1 ? "Tap another player to compare" : "Tap a selected player to deselect"}
          </div>

          {/* Score summary */}
          <div style={{marginBottom:14,display:"flex",gap:20,flexWrap:"wrap"}}>
            {bracketPlayers.map((p,i) => (
              <div key={p} style={{fontSize:13,color:textMuted}}>
                <span style={{color:PC[i],fontWeight:700}}>{names[p].split(" ")[0]}</span>
                &nbsp;·&nbsp;
                <span style={{color:PC[i],fontWeight:700}}>{scores[p].total} pts</span>
                &nbsp;·&nbsp;max {maxPossible[p]}&nbsp;·&nbsp;
                <span style={{color:canWin[p]?"#4ade80":"#ef4444",fontWeight:700}}>
                  {canWin[p]?"✓ Alive":"✗ Out"}
                </span>
              </div>
            ))}
          </div>

          {/* Region brackets — East+West row, South+Midwest row */}
          {[[REGIONS_DEF[0],REGIONS_DEF[2]],[REGIONS_DEF[1],REGIONS_DEF[3]]].map(([left,right]) => {
            const lc = REGION_COLORS[left.id];
            const rc = REGION_COLORS[right.id];
            const col = {display:"flex",flexDirection:"column",borderRight:"1px solid "+border2};
            const hdr = (label, color) => (
              <div style={{fontSize:9,fontWeight:700,color:color||textDim,textTransform:"uppercase",
                letterSpacing:"0.5px",padding:"3px 6px",background:headerBg,borderBottom:"1px solid "+border2,
                textAlign:"center",whiteSpace:"nowrap"}}>
                {label}
              </div>
            );
            return (
              <div key={left.id} style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <div style={{fontSize:10,fontWeight:700,color:lc,letterSpacing:"0.8px",textTransform:"uppercase"}}>{REGION_LABELS[left.id]}</div>
                  <div style={{fontSize:10,fontWeight:700,color:rc,letterSpacing:"0.8px",textTransform:"uppercase"}}>{REGION_LABELS[right.id]}</div>
                </div>
                <div style={{overflowX:"auto"}}>
                  <div style={{display:"flex",background:cardBg,borderRadius:8,overflow:"hidden",width:"fit-content",minWidth:"100%"}}>
                    {/* Left region: R1 → R2 → S16 → E8 */}
                    <div style={{...col,minWidth:100}}>{hdr("R1",lc)}{left.r1.map(id=>bR1Slot(id,bracketPlayers))}</div>
                    <div style={{...col,minWidth:72}}>{hdr("R2")}{left.r2.map(id=>bSlot(id,2,bracketPlayers))}</div>
                    <div style={{...col,minWidth:72}}>{hdr("S16")}{left.s16.map(id=>bSlot(id,4,bracketPlayers))}</div>
                    <div style={{...col,minWidth:72,borderRight:"2px solid "+border2}}>{hdr("E8")}{bSlot(left.e8,8,bracketPlayers)}</div>
                    {/* Right region: E8 → S16 → R2 → R1 (mirrored) */}
                    <div style={{...col,minWidth:72}}>{hdr("E8")}{bSlot(right.e8,8,bracketPlayers)}</div>
                    <div style={{...col,minWidth:72}}>{hdr("S16")}{right.s16.map(id=>bSlot(id,4,bracketPlayers))}</div>
                    <div style={{...col,minWidth:72}}>{hdr("R2")}{right.r2.map(id=>bSlot(id,2,bracketPlayers))}</div>
                    <div style={{display:"flex",flexDirection:"column",minWidth:100}}>{hdr("R1",rc)}{right.r1.map(id=>bR1Slot(id,bracketPlayers))}</div>
                  </div>
                </div>
              </div>
            );
          })}

          {/* Final Four + Championship */}
          <div style={{marginTop:8,display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
            {["FFL","FFR"].map(id => {
              const g = gameById[id];
              const actual = effectiveResults[id];
              const picks = bracketPlayers.map(p => g.picks[p]);
              const agree = bracketPlayers.length > 1 && picks[0] === picks[1];
              return (
                <div key={id} style={{flex:1,minWidth:130,padding:"10px 12px",borderRadius:8,background:cardBg,
                  border:`1px solid ${border}`}}>
                  <div style={{fontSize:10,color:textMuted,marginBottom:6}}>
                    {id==="FFL"?"Final Four · East/South":"Final Four · West/Midwest"}
                  </div>
                  {agree ? (
                    <div style={{display:"flex",gap:4,alignItems:"center"}}>
                      {PC.map((c,i) => <span key={i} style={{width:6,height:6,borderRadius:"50%",background:c}} />)}
                      <span style={{fontSize:13,fontWeight:700,color:textSub}}>{picks[0]||"—"}</span>
                    </div>
                  ) : picks.map((pick,i) => {
                    const correct = actual && pick === actual;
                    const wrong = actual && pick !== actual;
                    return (
                      <div key={i} style={{display:"flex",gap:4,alignItems:"center",marginBottom:2}}>
                        <span style={{width:6,height:6,borderRadius:"50%",background:PC[i],flexShrink:0}} />
                        <span style={{fontSize:12,fontWeight:700,
                          color:correct?"#86efac":wrong?"#fca5a5":PC[i],
                          textDecoration:wrong?"line-through":"none"}}>
                          {pick||"—"}{correct?" ✓":""}
                        </span>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
          {(() => {
            const g = gameById["CHAMP"];
            const actual = effectiveResults["CHAMP"];
            const picks = bracketPlayers.map(p => g.picks[p]);
            const agree = bracketPlayers.length > 1 && picks[0] === picks[1];
            return (
              <div style={{padding:"14px 16px",borderRadius:10,background:cardBg,textAlign:"center",
                border:`2px solid #f59e0b`}}>
                <div style={{fontSize:11,color:textSub,marginBottom:8}}>🏆 National Champion</div>
                {agree ? (
                  <div style={{display:"flex",gap:6,alignItems:"center",justifyContent:"center"}}>
                    {PC.map((c,i) => <span key={i} style={{width:7,height:7,borderRadius:"50%",background:c}} />)}
                    <span style={{fontSize:18,fontWeight:800,color:"#fbbf24"}}>{picks[0]||"—"}</span>
                  </div>
                ) : picks.map((pick,i) => {
                  const correct = actual && pick === actual;
                  const wrong = actual && pick !== actual;
                  return (
                    <div key={i} style={{display:"flex",gap:6,alignItems:"center",justifyContent:"center",marginBottom:4}}>
                      <span style={{width:7,height:7,borderRadius:"50%",background:PC[i],flexShrink:0}} />
                      <span style={{fontSize:17,fontWeight:800,
                        color:correct?"#86efac":wrong?"#fca5a5":PC[i],
                        textDecoration:wrong?"line-through":"none"}}>
                        {pick||"—"}{correct?" ✓":""}
                      </span>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>
      )}

      {/* Game cards */}
      {mode !== "bracket" && <div style={{padding:"16px 20px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:10}}>
        {roundGames.map(g => {
          const winner = effectiveResults[g.id];
          const isLocked = !!known_results[g.id];
          const rc = REGION_COLORS[g.region] || "#818cf8";
          const expanded = expandedGames.has(g.id);
          const pickCount = {};
          people.forEach(p => {
            const pk = g.picks[p];
            if (pk) { if (!pickCount[pk]) pickCount[pk] = []; pickCount[pk].push(names[p].split(" ")[0]); }
          });
          // Confirmed contestants: R1 uses t1/t2; R2+ derives from feeder results
          const feeders = FEEDERS[g.id];
          const confirmed = g.t1 && g.t2
            ? [g.t1, g.t2]
            : feeders ? feeders.map(f => effectiveResults[f]).filter(Boolean) : [];
          // Dead picks: picked teams that are eliminated and not an actual contestant
          const deadPicks = Object.keys(pickCount).filter(t => deadTeams.has(t) && !confirmed.includes(t));
          // Full list: confirmed teams first, then dead picks; fall back to all picks if nothing confirmed
          const teams = confirmed.length > 0
            ? [...confirmed, ...deadPicks]
            : Object.keys(pickCount).sort((a,b) => (pickCount[b]||[]).length-(pickCount[a]||[]).length);

          return (
            <div key={g.id} style={{background:cardBg,borderRadius:10,border:"1px solid "+border,overflow:"hidden"}}>
              <div style={{background:rc+"18",borderBottom:"1px solid "+rc+"44",padding:"7px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:10,fontWeight:700,color:rc,letterSpacing:"0.5px",textTransform:"uppercase"}}>
                  {g.region ? REGION_LABELS[g.region] : ""} {g.pts > 1 ? "· "+g.pts+"pts" : "· 1pt"}
                </span>
                <button onClick={() => setExpandedGames(s => { const n = new Set(s); expanded ? n.delete(g.id) : n.add(g.id); return n; })}
                  style={{background:"none",border:"none",color:textDim,cursor:"pointer",fontSize:10,padding:0}}>
                  {expanded ? "▲" : "▼"} picks
                </button>
              </div>

              <div style={{padding:"10px"}}>
                <div style={{fontSize:11,color:textMuted,marginBottom:GAME_TIMES[g.id]?4:8}}>
                  {g.region ? REGION_LABELS[g.region]+" · " : ""}{ROUND_LABELS[g.round]}
                </div>
                {GAME_TIMES[g.id] && (
                  <div style={{fontSize:10,color:textSub,marginBottom:8}}>
                    {GAME_TIMES[g.id].time} · <span style={{color:"#60a5fa"}}>{GAME_TIMES[g.id].tv}</span>
                  </div>
                )}

                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {teams.map(team => {
                    const isActualWin = known_results[g.id] === team;
                    const isSimWin = simOverrides[g.id] === team;
                    const isManualWin = winner === team && !isActualWin && !isSimWin;
                    const isDead = deadTeams.has(team);
                    const isDisabled = isDead || isLocked;
                    const cnt = (pickCount[team]||[]).length;
                    const pickers = pickCount[team]||[];
                    return (
                      <div key={team}>
                        <button
                          onClick={isDisabled ? undefined : () => {
                            if (isSimWin) {
                              setSimOverrides(s => { const n = {...s}; delete n[g.id]; return n; });
                              setSimulatingPlayer(null);
                            } else {
                              setSimOverrides(s => { const n = {...s}; delete n[g.id]; return n; });
                              setWinner(g.id, team);
                            }
                          }}
                          disabled={isDisabled}
                          style={{
                            display:"flex",alignItems:"center",justifyContent:"space-between",
                            width:"100%",padding:"8px 10px",
                            borderRadius: expanded && cnt > 0 ? "7px 7px 0 0" : 7,
                            cursor:isDisabled?"default":"pointer",textAlign:"left",
                            border: isActualWin ? "2px solid #22c55e" : isSimWin ? "2px solid #a855f7" : isManualWin ? "2px solid #22c55e" : "1px solid "+border2,
                            background: isActualWin ? "#052e16" : isSimWin ? "#2d1b4e" : isManualWin ? "#052e16" : inputBg,
                            color: isActualWin ? "#86efac" : isSimWin ? "#d8b4fe" : isManualWin ? "#86efac" : isDead ? textSub : text,
                            fontWeight: (isActualWin || isSimWin || isManualWin) ? 700 : 400, fontSize:13,
                          }}>
                          <span style={{textDecoration: isDead ? "line-through" : "none"}}>
                            {short(team)}{teamSeed[team] ? <span style={{color:"#64748b",marginLeft:4}}>{teamSeed[team]}</span> : null} {isActualWin ? "✓" : ""}
                          </span>
                          <span style={{fontSize:10,color:isActualWin?"#4ade80":isSimWin?"#c084fc":isManualWin?"#4ade80":textMuted}}>
                            {cnt > 0 ? cnt+"/"+ people.length : ""}
                          </span>
                        </button>
                        {expanded && cnt > 0 && (
                          <div style={{padding:"5px 10px 6px",
                            border: isActualWin ? "2px solid #22c55e" : isSimWin ? "2px solid #a855f7" : isManualWin ? "2px solid #22c55e" : "1px solid "+border2,
                            borderTop:"none",borderRadius:"0 0 7px 7px",background:pageBg,
                            display:"flex",flexWrap:"wrap",gap:4}}>
                            {pickers.map(name => (
                              <span key={name} style={{fontSize:10,padding:"2px 6px",borderRadius:4,
                                background: isActualWin||isManualWin ? "#052e16" : isSimWin ? "#2d1b4e" : chipBg,
                                color: isActualWin||isManualWin ? "#86efac" : isSimWin ? "#d8b4fe" : isDead ? "#fca5a5" : "#93c5fd",
                                border: "1px solid " + (isActualWin||isManualWin ? "#166534" : isSimWin ? "#6b21a8" : isDead ? "#7f1d1d" : "#1e40af")}}>
                                {name}
                              </span>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        })}
      </div>}

      {/* Score table */}
      {mode !== "bracket" &&
      <div style={{padding:"0 20px 40px"}}>
        <div style={{fontSize:12,color:textMuted,marginBottom:8,fontWeight:500}}>Full Score Breakdown</div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,background:cardBg,borderRadius:8,overflow:"hidden"}}>
            <thead>
              <tr style={{background:inputBg}}>
                <th style={{textAlign:"left",padding:"8px 12px",color:textSub,fontWeight:600}}>Player</th>
                {ROUND_ORDER.map(r => <th key={r} style={{textAlign:"center",padding:"8px",color:textMuted,fontWeight:400,fontSize:11}}>{ROUND_LABELS[r]}</th>)}
                <th style={{textAlign:"center",padding:"8px 12px",color:textSub,fontWeight:600}}>Total</th>
                <th style={{textAlign:"center",padding:"8px 12px",color:textMuted,fontWeight:400,fontSize:11}}>Max</th>
                <th style={{textAlign:"center",padding:"8px 12px",color:textMuted,fontWeight:400,fontSize:11}}>Can Win?</th>
                <th style={{textAlign:"center",padding:"8px 12px",color:textMuted,fontWeight:400,fontSize:11}}>🏆 Pick</th>
              </tr>
            </thead>
            <tbody>
              {ranked.map((p,i) => (
                <tr key={p} style={{borderTop:"1px solid "+border2,background:i%2===0?rowAlt:"transparent"}}>
                  <td style={{padding:"7px 12px",color:rankNums[i]===1?"#93c5fd":text,fontWeight:rankNums[i]===1?700:400}}>
                    {names[p]}
                  </td>
                  {ROUND_ORDER.map(r => (
                    <td key={r} style={{textAlign:"center",padding:"7px 8px",
                      color: (scores[p].byRound[r]||0)>0 ? "#86efac" : textDimmer,fontWeight:400}}>
                      {scores[p].byRound[r] || "—"}
                    </td>
                  ))}
                  <td style={{textAlign:"center",padding:"7px 12px",fontWeight:700,color:"#60a5fa",fontSize:14}}>{scores[p].total}</td>
                  <td style={{textAlign:"center",padding:"7px 12px",color:textDim,fontSize:11}}>{maxPossible[p]}</td>
                  <td style={{textAlign:"center",padding:"7px 12px",fontWeight:700,fontSize:12,
                    color: canWin[p] ? "#4ade80" : "#ef4444"}}>
                    {canWin[p] ? "✓" : "✗"}
                  </td>
                  <td style={{textAlign:"center",padding:"7px 12px",color:textSub,fontSize:11}}>{CHAMP_PICKS[p]}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>}
      {/* Bouncing people avatars */}
      {colorScheme === "tonie" && people.map((p, pi) => {
        if (hiddenPeople.has(p)) return null;
        const isOut = !canWin[p];
        const isLeading = rankNums[ranked.indexOf(p)] === 1;
        const isSpinning = spinningPeople.has(p);
        const isSelected = simulatingPlayer === p;
        const personColor = PERSON_COLOR_LIST[pi % PERSON_COLOR_LIST.length];
        const size = isSelected ? 110 : 70;
        return (
          <div key={"avatar-"+p} ref={el => { personRefsMap.current[p] = el; }}
            onClick={() => handlePersonTap(p)}
            style={{position:"fixed",left:(personStateRef.current?.[p]?.x??50)+"px",
              top:(personStateRef.current?.[p]?.y??50)+"px",
              width:size,height:size,zIndex:isSelected?9998:9997,
              cursor:"pointer",userSelect:"none",
              pointerEvents: isSpinning ? "none" : "auto",
              transition:"width 0.3s,height 0.3s"}}>
            {isLeading && (
              <span style={{position:"absolute",top:-28,left:"50%",transform:"translateX(-50%)",
                fontSize:28,zIndex:1,filter:"drop-shadow(0 1px 3px rgba(0,0,0,0.6))"}}>👑</span>
            )}
            {isOut && (
              <span style={{position:"absolute",top:-28,left:"50%",transform:"translateX(-50%)",
                fontSize:28,zIndex:1,animation:"poop-float 1.4s ease-in-out infinite"}}>💩</span>
            )}
            <img src={"./headshots/"+names[p].split(" ")[0]+".jpg"} alt={names[p].split(" ")[0]}
              style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",display:"block",
                border: isSelected ? `4px solid ${personColor}` : "3px solid white",
                boxShadow: isSelected
                  ? `0 0 0 3px ${personColor}44, 0 4px 20px ${personColor}88`
                  : "0 2px 12px rgba(0,0,0,0.5)",
                filter: isSelected ? `drop-shadow(0 0 8px ${personColor})` : "none",
                transition:"width 0.3s,height 0.3s,border 0.3s,box-shadow 0.3s",
                animation: isSpinning ? "tonie-spin-away 0.7s forwards ease-in" : "none"}} />
          </div>
        );
      })}

      {/* Celebration overlay */}
      {colorScheme === "tonie" && showCelebration && (
        <div style={{position:"fixed",inset:0,zIndex:99998,pointerEvents:"none",overflow:"hidden"}}>
          <div style={{position:"absolute",top:"42%",left:"50%",fontSize:72,textAlign:"center",
            lineHeight:1.2,animation:"celebration-pop 0.5s ease-out forwards"}}>
            🎉🏆🎉<br/><span style={{fontSize:32,fontWeight:900,color:"#fff",
              textShadow:"0 2px 16px rgba(0,0,0,0.8)"}}>TAHOE TEAM FOREVER!!</span>
          </div>
          {["🎊","✨","🌟","🎈","🎉","💫","⭐","🎊","✨","🌟","🎈","🎉","💫","⭐","🎊","✨","🌟","🎈"].map((e,i) => (
            <span key={i} style={{
              position:"absolute",
              left:`${(i*5+7)%94}%`,
              top:-40,
              fontSize:20+(i%4)*10,
              animation:`confetti-fly ${1.2+(i%5)*0.25}s ${i*0.08}s ease-in forwards`,
            }}>{e}</span>
          ))}
        </div>
      )}

      {/* Bouncing Tonie */}
      {colorScheme === "tonie" && !tonieHidden && (
        <img
          key={tonieKey}
          ref={tonieImgRef}
          src="./tonie.png"
          alt="Tonie"
          onClick={handleTonieTap}
          style={{
            position:"fixed",
            left: toniePosRef.current.x + "px",
            top:  toniePosRef.current.y + "px",
            width:200, height:200,
            borderRadius:"50%",
            objectFit:"cover",
            objectPosition:"center 20%",
            cursor:"pointer",
            zIndex:9999,
            animation: tonieSpinning
              ? "tonie-spin-away 0.7s forwards ease-in"
              : "tonie-come-back 0.5s ease-out",
            pointerEvents: tonieSpinning ? "none" : "auto",
            userSelect:"none",
          }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(BracketScorer));
  </script>
</body>
</html>
